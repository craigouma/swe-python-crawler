name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Copy files and install dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: /home/crawler_svc/swe-python-crawler
          rm: false
          strip_components: 0
          tar_exclude: |
            .git
            .github

      - name: Post-deployment setup
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /home/crawler_svc/swe-python-crawler

            # Create virtual environment if it does not already exist
            if [ ! -d "venv" ]; then
              python3 -m venv venv
              echo "Virtual environment created."
            else
              echo "Virtual environment already exists — skipping creation."
            fi

            # Activate venv, upgrade pip, install dependencies
            source venv/bin/activate
            pip install --upgrade pip --quiet
            pip install -r requirements.txt --quiet
            deactivate

            # Ensure the launcher script is executable
            chmod +x run_crawler.sh

            echo "Deployment complete."
